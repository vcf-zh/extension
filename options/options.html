<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: -apple-system, sans-serif; padding: 16px; width: 300px; }
    h2 { font-size: 15px; margin: 0 0 14px; }
    .row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
    label { font-size: 13px; color: #333; }
    .divider { border: none; border-top: 1px solid #eee; margin: 12px 0; }
    button { font-size: 12px; padding: 5px 12px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #f5f5f5; }
    button:hover { background: #e8e8e8; }
    .status { font-size: 11px; color: #888; margin-top: 6px; }
    .key-box { margin-top: 10px; }
    .key-box input { width: 100%; box-sizing: border-box; font-size: 12px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; margin-top: 4px; }
    .key-label { font-size: 12px; color: #555; }
    .save-btn { margin-top: 6px; width: 100%; background: #1a73e8; color: white; border: none; border-radius: 4px; padding: 7px; font-size: 13px; cursor: pointer; }
    .save-btn:hover { background: #1558b0; }
    .hint { font-size: 10px; color: #999; margin-top: 4px; }
    .saved { color: #0a0; font-size: 11px; }
  </style>
</head>
<body>
  <h2>VCF 中文化</h2>

  <div class="row">
    <label>启用中文化</label>
    <input type="checkbox" id="toggle" checked>
  </div>
  <div class="row">
    <button id="refresh">更新翻译包</button>
  </div>
  <div class="status" id="status">加载中...</div>

  <hr class="divider">

  <div class="key-box">
    <div class="key-label">MiniMax API Key（配置后自动翻译新字符串）</div>
    <input type="password" id="apiKey" placeholder="输入你的 MiniMax API Key">
    <button class="save-btn" id="saveKey">保存</button>
    <div class="hint">Key 仅保存在本地浏览器，不会上传。获取地址：platform.minimaxi.com</div>
    <div class="saved" id="savedHint"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
